<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
  <title>Danh sách món ăn</title>
</head>
<body>

<div layout:fragment="content">
  <h2>Thực Đơn Món Ăn</h2>

  <p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;"></p>

  <div th:if="${#lists.isEmpty(dishes)}">
    <p>Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau</p>
  </div>

  <table th:unless="${#lists.isEmpty(dishes)}" border="1">
    <thead>
    <tr>
      <th>Tên</th>
      <th>Trạng thái</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="d : ${dishes}">
      <td th:text="${d.name}" th:style="${!d.isAvailable} ? 'color: red' : ''"></td>
      <td th:text="${d.isAvailable ? 'Còn' : 'Hết'}"></td>
      <td>
        <a th:href="@{/bai3/edit/{id}(id=${d.id})}">Sửa</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
